<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetherbound E Rank Raid</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 760px;
            margin: 40px auto;
            padding: 0 20px;
        }
        form {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }
        button {
            font-size: 16px;
            padding: 10px 18px;
            margin-top: 10px;
            cursor: pointer;
        }
        pre {
            white-space: pre-wrap;
            background: #f8f8f8;
            padding: 18px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <h1>Aetherbound E Rank Raid</h1>
    <p>Enter your player details and click "Run Raid" to start the game.</p>
    <form id="runForm" action="/run" method="post">
        <label for="name">Player Name:</label>
        <input type="text" id="name" name="name" value="Soulflare" required>

        <label for="hp">HP:</label>
        <input type="number" id="hp" name="hp" value="54" min="1" required>

        <label for="mp">MP:</label>
        <input type="number" id="mp" name="mp" value="48" min="0" required>

        <label for="atk">ATK:</label>
        <input type="number" id="atk" name="atk" value="5" min="1" required>

        <label for="spells">Spells (choose multiple):</label>
        <select id="spells" name="spells" multiple size="8">
            <option value="hp potion">HP Potion (0 MP, +3 HP)</option>
            <option value="mp potion">MP Potion (0 MP, +10 MP)</option>
            <option value="stealth">Stealth (10 MP, avoids attacks except boss)</option>
            <option value="brisingr">Brisingr (20 MP, burn 3 turns, 30% stun)</option>
            <option value="véddr">Véddr (10 MP, 20% damage, stun 1 turn)</option>
            <option value="reisa">Reisa (5 MP, 20% damage, 30% stun)</option>
            <option value="letta">Letta (10 MP, 30% chance to deflect 80% damage)</option>
            <option value="thrysta">Thrysta (20 MP, 50% 120% damage / 50% 80% damage)</option>
            <option value="gánga">Gánga (5 MP, 40% chance to dodge next attack)</option>
        </select>
        <p style="font-size: 0.9em; color: #555; margin-top: 5px;">Hold Ctrl (Windows) or Cmd (Mac) to select multiple spells.</p>

        <button type="submit">Run Raid</button>
    </form>

    {% if result %}
    <div id="result">
        <h2>Game Results</h2>
        <pre>{{ result.logs | join('\n') }}</pre>
    </div>
    {% endif %}
</body>
</html>
